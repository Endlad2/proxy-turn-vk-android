name: Build WDTT APKs

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (optional)'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build WDTT APKs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Android NDK
        run: |
          echo "::group::Install Android NDK"
          SDK_ROOT=$ANDROID_HOME
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=$ANDROID_SDK_ROOT
          fi
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=/usr/local/android-sdk
          fi
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup additional dependencies
        run: |
          echo "::group::Install additional dependencies"
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            build-essential \
            git \
            wget \
            curl
          echo "::endgroup::"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Make all scripts executable
        run: |
          chmod +x scripts/*.sh || true
          chmod +x scripts/build_go_libs || true
          chmod +x scripts/build-go-lib.sh || true
          chmod +x scripts/build_client.sh || true
          chmod +x scripts/build_apk.sh || true
          chmod +x gradlew || true
          echo "All scripts are now executable"

      - name: Build Go libs
        run: |
          echo "::group::Build Go libs"
          if [ -f "scripts/build_go_libs" ]; then
            ./scripts/build_go_libs
          else
            echo "build_go_libs not found, skipping..."
          fi
          echo "::endgroup::"

      - name: Build client
        env:
          GO111MODULE: on
          GOPROXY: https://proxy.golang.org,direct
          GOFLAGS: "-ldflags=-checklinkname=0"
        run: |
          echo "::group::Build client"
          ./scripts/build_client.sh
          echo "::endgroup::"

      - name: Build APKs with build_apk.sh
        run: |
          echo "::group::Build APKs with build_apk.sh"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="release"
          fi
          
          export BUILD_TYPE=$BUILD_TYPE
          
          if [ -f "scripts/build_apk.sh" ]; then
            ./scripts/build_apk.sh
          else
            echo "::error::build_apk.sh not found!"
            exit 1
          fi
          echo "::endgroup::"

      - name: Find and rename APKs
        id: find_apks
        run: |
          echo "::group::Find and rename APKs"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="release"
          fi
          
          # Find all APKs
          APK_PATHS=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -v "unaligned")
          
          if [ -z "$APK_PATHS" ]; then
            echo "::error::No APKs found!"
            find app/build/outputs -type f 2>/dev/null || echo "No files found"
            exit 1
          fi
          
          echo "Found APKs:"
          echo "$APK_PATHS"
          
          # Copy and rename each APK
          for APK_PATH in $APK_PATHS; do
            if [[ "$APK_PATH" == *"arm64-v8a"* ]]; then
              cp "$APK_PATH" "WDTT-arm64-v8a.apk"
              echo "Created: WDTT-arm64-v8a.apk"
            elif [[ "$APK_PATH" == *"armeabi-v7a"* ]]; then
              cp "$APK_PATH" "WDTT-armeabi-v7a.apk"
              echo "Created: WDTT-armeabi-v7a.apk"
            elif [[ "$APK_PATH" == *"x86_64"* ]]; then
              cp "$APK_PATH" "WDTT-x86_64.apk"
              echo "Created: WDTT-x86_64.apk"
            elif [[ "$APK_PATH" == *"universal"* ]]; then
              cp "$APK_PATH" "WDTT-universal.apk"
              echo "Created: WDTT-universal.apk"
            else
              # If can't detect, copy with generic name
              BASENAME=$(basename "$APK_PATH")
              cp "$APK_PATH" "$BASENAME"
              echo "Created: $BASENAME"
            fi
          done
          
          echo "::endgroup::"

      - name: List built APKs
        run: |
          echo "::group::Built APKs"
          ls -lh *.apk 2>/dev/null || echo "No APK files found"
          echo "::endgroup::"

      - name: Upload all APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WDTT-APKs
          path: |
            WDTT-*.apk
            *.apk
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.release_tag != '' || github.ref_type == 'tag'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "::group::Artifacts"
          find artifacts -name "*.apk" -type f
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/WDTT-APKs/WDTT-arm64-v8a.apk
            artifacts/WDTT-APKs/WDTT-armeabi-v7a.apk
            artifacts/WDTT-APKs/WDTT-x86_64.apk
            artifacts/WDTT-APKs/WDTT-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
