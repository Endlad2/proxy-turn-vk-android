name: Build WDTT APKs

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (optional)'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK (${{ matrix.arch.name }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch:
          - name: arm64-v8a
            abi: arm64-v8a
            output: WDTT-arm64-v8a.apk
          - name: armeabi-v7a
            abi: armeabi-v7a
            output: WDTT-armeabi-v7a.apk
          - name: x86_64
            abi: x86_64
            output: WDTT-x86_64.apk
          - name: universal
            abi: universal
            output: WDTT-universal.apk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Android NDK
        run: |
          echo "::group::Install Android NDK"
          SDK_ROOT=$ANDROID_HOME
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=$ANDROID_SDK_ROOT
          fi
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=/usr/local/android-sdk
          fi
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          
          # Install NDK
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build client for ${{ matrix.arch.abi }}
        run: |
          echo "::group::Build client for ${{ matrix.arch.abi }}"
          chmod +x scripts/build_client.sh
          
          if [ "${{ matrix.arch.abi }}" == "universal" ]; then
            # Build all ABIs for universal
            ./scripts/build_client.sh arm64-v8a
            ./scripts/build_client.sh armeabi-v7a
            ./scripts/build_client.sh x86_64
          else
            ./scripts/build_client.sh ${{ matrix.arch.abi }}
          fi
          echo "::endgroup::"

      - name: Build server for ${{ matrix.arch.abi }}
        run: |
          echo "::group::Build server for ${{ matrix.arch.abi }}"
          chmod +x scripts/build_server.sh
          
          if [ "${{ matrix.arch.abi }}" == "universal" ]; then
            # Build all ABIs for universal
            ./scripts/build_server.sh arm64-v8a
            ./scripts/build_server.sh armeabi-v7a
            ./scripts/build_server.sh x86_64
          else
            ./scripts/build_server.sh ${{ matrix.arch.abi }}
          fi
          echo "::endgroup::"

      - name: Build APK with build_apk.sh
        run: |
          echo "::group::Build APK with build_apk.sh"
          chmod +x scripts/build_apk.sh
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          # Check if build_apk.sh accepts ABI parameter
          if grep -q "ANDROID_ABI" scripts/build_apk.sh || grep -q "\$1" scripts/build_apk.sh; then
            if [ "${{ matrix.arch.abi }}" == "universal" ]; then
              ./scripts/build_apk.sh
            else
              ./scripts/build_apk.sh ${{ matrix.arch.abi }}
            fi
          else
            # If build_apk.sh doesn't accept ABI, use gradle directly
            echo "build_apk.sh doesn't accept ABI parameter, using gradle directly"
            if [ "${{ matrix.arch.abi }}" == "universal" ]; then
              if [ "$BUILD_TYPE" == "release" ]; then
                ./gradlew :app:assembleRelease
              else
                ./gradlew :app:assembleDebug
              fi
            else
              if [ "$BUILD_TYPE" == "release" ]; then
                ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=${{ matrix.arch.abi }}
              else
                ./gradlew :app:assembleDebug -Pandroid.injected.build.abi=${{ matrix.arch.abi }}
              fi
            fi
          fi
          echo "::endgroup::"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Find and rename APK
        id: find_apk
        run: |
          echo "::group::Find APK"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          # Find APK - try multiple locations
          APK_PATH=""
          POSSIBLE_PATHS=(
            "app/build/outputs/apk/$BUILD_TYPE/*.apk"
            "app/build/outputs/apk/*/*.apk"
            "app/build/outputs/apk/*.apk"
          )
          
          for pattern in "${POSSIBLE_PATHS[@]}"; do
            FOUND=$(find $pattern -name "*.apk" 2>/dev/null | grep -v "unaligned" | head -n 1)
            if [ -n "$FOUND" ]; then
              APK_PATH="$FOUND"
              break
            fi
          done
          
          # If still not found, try without build type
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -v "unaligned" | head -n 1)
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
          
          # Rename APK
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "${{ matrix.arch.output }}"
            echo "APK_RENAMED=${{ matrix.arch.output }}" >> $GITHUB_ENV
            echo "APK size: $(du -h ${{ matrix.arch.output }} | cut -f1)"
          else
            echo "::error::APK not found!"
            echo "Contents of app/build/outputs/apk:"
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch.output }}
          path: ${{ matrix.arch.output }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.release_tag != '' || github.ref_type == 'tag'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "::group::Artifacts"
          find artifacts -name "*.apk" -type f
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/WDTT-arm64-v8a.apk/WDTT-arm64-v8a.apk
            artifacts/WDTT-armeabi-v7a.apk/WDTT-armeabi-v7a.apk
            artifacts/WDTT-x86_64.apk/WDTT-x86_64.apk
            artifacts/WDTT-universal.apk/WDTT-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
