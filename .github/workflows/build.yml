name: Build WDTT APKs

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (optional)'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK (${{ matrix.arch.name }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        arch:
          - name: arm64-v8a
            abi: arm64-v8a
            output: WDTT-arm64-v8a.apk
          - name: armeabi-v7a
            abi: armeabi-v7a
            output: WDTT-armeabi-v7a.apk
          - name: x86_64
            abi: x86_64
            output: WDTT-x86_64.apk
          - name: universal
            abi: universal
            output: WDTT-universal.apk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Android NDK
        run: |
          echo "::group::Install Android NDK"
          SDK_ROOT=$ANDROID_HOME
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=$ANDROID_SDK_ROOT
          fi
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=/usr/local/android-sdk
          fi
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          
          # Install NDK
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup additional dependencies
        run: |
          echo "::group::Install additional dependencies"
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            build-essential \
            git \
            wget \
            curl
          echo "::endgroup::"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Make scripts executable
        run: |
          chmod +x scripts/build_go_libs || true
          chmod +x scripts/build_client.sh || true
          chmod +x scripts/build_apk.sh || true
          chmod +x gradlew || true

      - name: Build Go libs
        run: |
          echo "::group::Build Go libs"
          if [ -f "scripts/build_go_libs" ]; then
            ./scripts/build_go_libs
          else
            echo "build_go_libs not found, skipping..."
          fi
          echo "::endgroup::"

      - name: Build client for ${{ matrix.arch.abi }}
        run: |
          echo "::group::Build client for ${{ matrix.arch.abi }}"
          
          # Set ABI environment variable if needed
          export ANDROID_ABI=${{ matrix.arch.abi }}
          
          if [ "${{ matrix.arch.abi }}" == "universal" ]; then
            # For universal, build all ABIs
            ./scripts/build_client.sh arm64-v8a || ./scripts/build_client.sh
          else
            # For single ABI, pass as argument or use environment variable
            if grep -q "\$1" scripts/build_client.sh; then
              ./scripts/build_client.sh ${{ matrix.arch.abi }}
            else
              # If script doesn't accept arguments, use environment variable
              export ABI_FILTER=${{ matrix.arch.abi }}
              ./scripts/build_client.sh
            fi
          fi
          echo "::endgroup::"

      - name: Build APK with build_apk.sh
        run: |
          echo "::group::Build APK with build_apk.sh"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          # Set build type environment variable
          export BUILD_TYPE=$BUILD_TYPE
          
          # Run build_apk.sh
          if [ -f "scripts/build_apk.sh" ]; then
            ./scripts/build_apk.sh
          else
            echo "build_apk.sh not found, using gradle directly"
            if [ "$BUILD_TYPE" == "release" ]; then
              ./gradlew :app:assembleRelease
            else
              ./gradlew :app:assembleDebug
            fi
          fi
          echo "::endgroup::"

      - name: Find and rename APK
        id: find_apk
        run: |
          echo "::group::Find APK"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          # Find APK - try multiple locations
          APK_PATH=""
          POSSIBLE_PATHS=(
            "app/build/outputs/apk/$BUILD_TYPE/*.apk"
            "app/build/outputs/apk/*/*.apk"
            "app/build/outputs/apk/*.apk"
            "app/build/outputs/*.apk"
            "app/build/outputs/apk/**/*.apk"
          )
          
          for pattern in "${POSSIBLE_PATHS[@]}"; do
            FOUND=$(find $pattern -name "*.apk" 2>/dev/null | grep -v "unaligned" | head -n 1)
            if [ -n "$FOUND" ]; then
              APK_PATH="$FOUND"
              break
            fi
          done
          
          # If still not found, try without build type
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -not -path "./.gradle/*" 2>/dev/null | grep -v "unaligned" | head -n 1)
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
          
          # Rename APK
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            # Try to find ABI in filename or use matrix abi
            if [[ "$APK_PATH" == *"arm64-v8a"* ]]; then
              cp "$APK_PATH" "WDTT-arm64-v8a.apk"
            elif [[ "$APK_PATH" == *"armeabi-v7a"* ]]; then
              cp "$APK_PATH" "WDTT-armeabi-v7a.apk"
            elif [[ "$APK_PATH" == *"x86_64"* ]]; then
              cp "$APK_PATH" "WDTT-x86_64.apk"
            elif [[ "$APK_PATH" == *"universal"* ]]; then
              cp "$APK_PATH" "WDTT-universal.apk"
            else
              # Use matrix abi if can't detect
              cp "$APK_PATH" "${{ matrix.arch.output }}"
            fi
            echo "APK_RENAMED=${{ matrix.arch.output }}" >> $GITHUB_ENV
            echo "APK size: $(du -h ${{ matrix.arch.output }} | cut -f1)"
          else
            echo "::error::APK not found!"
            echo "Contents of app/build/outputs:"
            find app/build/outputs -type f 2>/dev/null || echo "Directory not found"
            echo "All APK files in project:"
            find . -name "*.apk" -not -path "./.gradle/*" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch.output }}
          path: ${{ matrix.arch.output }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.release_tag != '' || github.ref_type == 'tag'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "::group::Artifacts"
          find artifacts -name "*.apk" -type f
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/WDTT-arm64-v8a.apk/WDTT-arm64-v8a.apk
            artifacts/WDTT-armeabi-v7a.apk/WDTT-armeabi-v7a.apk
            artifacts/WDTT-x86_64.apk/WDTT-x86_64.apk
            artifacts/WDTT-universal.apk/WDTT-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
