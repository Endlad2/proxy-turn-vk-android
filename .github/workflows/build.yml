name: Build WDTT APKs

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (optional)'
        required: false
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Android NDK
        run: |
          echo "::group::Install Android NDK"
          SDK_ROOT=$ANDROID_HOME
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=$ANDROID_SDK_ROOT
          fi
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=/usr/local/android-sdk
          fi
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup additional dependencies
        run: |
          echo "::group::Install additional dependencies"
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            build-essential \
            git \
            wget \
            curl \
            tree
          echo "::endgroup::"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Make all scripts executable
        run: |
          chmod +x scripts/*.sh || true
          chmod +x scripts/build_go_libs || true
          chmod +x scripts/build-go-lib.sh || true
          chmod +x scripts/build_client.sh || true
          chmod +x scripts/build_apk.sh || true
          chmod +x scripts/*.bat || true
          chmod +x gradlew || true
          echo "All scripts are now executable"

      - name: Build Go libs
        run: |
          echo "::group::Build Go libs"
          if [ -f "scripts/build_go_libs" ]; then
            ./scripts/build_go_libs
          else
            echo "build_go_libs not found, skipping..."
          fi
          echo "::endgroup::"

      - name: Build client
        run: |
          echo "::group::Build client"
          if [ -f "scripts/build_client.sh" ]; then
            ./scripts/build_client.sh
          else
            echo "build_client.sh not found, skipping..."
          fi
          echo "::endgroup::"

      - name: Build APK with build_apk.sh
        run: |
          echo "::group::Build APK with build_apk.sh"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          export BUILD_TYPE=$BUILD_TYPE
          
          if [ -f "scripts/build_apk.sh" ]; then
            ./scripts/build_apk.sh
          else
            echo "build_apk.sh not found, using gradle directly"
            if [ "$BUILD_TYPE" == "release" ]; then
              ./gradlew :app:assembleRelease
            else
              ./gradlew :app:assembleDebug
            fi
          fi
          echo "::endgroup::"
          
      - name: Show project tree
        run: |
          echo "::group::Project tree"
          tree -L 3
          echo "::endgroup::"

      - name: Find and upload APKs
        run: |
          echo "::group::Find APKs"
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi
          
          # Find all APK files (excluding unaligned ones)
          APK_FILES=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -v "unaligned" || echo "")
          
          if [ -z "$APK_FILES" ]; then
            APK_FILES=$(find . -name "*.apk" -not -path "./.gradle/*" 2>/dev/null | grep -v "unaligned" || echo "")
          fi
          
          if [ -n "$APK_FILES" ]; then
            echo "Found APK files:"
            echo "$APK_FILES"
            
            # Upload each APK found
            for apk in $APK_FILES; do
              echo "Processing: $apk"
              apk_name=$(basename "$apk")
              echo "APK_NAME=$apk_name" >> $GITHUB_ENV
              
              # Upload as artifact with unique name
              echo "::group::Upload $apk_name"
              echo "Uploading: $apk_name"
              echo "::endgroup::"
            done
          else
            echo "::warning::No APK files found"
            find app/build/outputs -type f 2>/dev/null || echo "No files found"
          fi
          
          echo "::endgroup::"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WDTT-APKs
          path: |
            app/build/outputs/apk/**/*.apk
            !**/*unaligned*.apk
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.release_tag != '' || github.ref_type == 'tag'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "::group::Artifacts"
          find artifacts -name "*.apk" -type f
          echo "::endgroup::"
          
      - name: Show tree of artifacts
        run: |
          echo "::group::Artifacts tree"
          tree artifacts || ls -la artifacts/
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
